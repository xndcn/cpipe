repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        entry: clang-format -i
        language: system
        files: '\.(c|cc|cpp|cxx|h|hpp)$'
      - id: node-manifest-schema
        name: node manifest schema
        entry: bash -c 'npx --yes ajv-cli@5.0.0 validate --spec=draft2020 -s schemas/node-v0.1.json -d "src/cpipe/nodes/*.json"'
        language: system
        files: '^(schemas/node-v0\.1\.json|src/cpipe/nodes/.*\.json)$'
        pass_filenames: false
