repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.6
    hooks:
      - id: clang-format
        types_or: [c++, c]
  - repo: local
    hooks:
      - id: ajv-node-manifests
        name: ajv node manifests
        language: node
        additional_dependencies:
          - ajv-cli@5.0.0
        entry: ajv validate --spec=draft2020 -s schemas/node-v0.1.json -d
        files: ^src/cpipe/nodes/.*\.json$
