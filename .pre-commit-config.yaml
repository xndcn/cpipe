repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c]
  - repo: local
    hooks:
      - id: validate-node-manifests
        name: validate node manifests
        entry: node scripts/validate-node-manifests.cjs
        language: node
        additional_dependencies: [ajv@8.17.1]
        files: ^(schemas/(node|pipeline)-v0\.[12]\.json|src/cpipe/nodes/.*\.json|tests/fixtures/min-pipeline\.cpipe\.json)$
