name: build-and-test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-${{ github.sha }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-format clang-tidy git-lfs libvulkan1 mesa-vulkan-drivers ninja-build vulkan-tools
          git lfs install --local
          git lfs pull
          python3 -m pip install --user pre-commit
      - name: Bootstrap vcpkg
        run: |
          if [ ! -x "$VCPKG_ROOT/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
            "$VCPKG_ROOT/bootstrap-vcpkg.sh"
          fi
      - name: pre-commit
        run: pre-commit run --all-files
      - name: clang-tidy placeholder
        run: |
          cmake --preset linux-debug
          cmake --build --preset linux-debug -j
          run-clang-tidy -p build/linux-debug

  build-debug:
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-${{ github.sha }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-
      - name: Bootstrap vcpkg
        run: |
          if [ ! -x "$VCPKG_ROOT/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
            "$VCPKG_ROOT/bootstrap-vcpkg.sh"
          fi
      - name: Install Vulkan tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs libvulkan1 mesa-vulkan-drivers ninja-build vulkan-tools
          git lfs install --local
          git lfs pull
      - name: Build Debug
        run: |
          cmake --preset linux-debug
          cmake --build --preset linux-debug -j

  build-release:
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-${{ github.sha }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-
      - name: Bootstrap vcpkg
        run: |
          if [ ! -x "$VCPKG_ROOT/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
            "$VCPKG_ROOT/bootstrap-vcpkg.sh"
          fi
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang git-lfs libvulkan1 mesa-vulkan-drivers ninja-build vulkan-tools
          git lfs install --local
          git lfs pull
      - name: Build Release
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake --preset linux-release-clang
          cmake --build --preset linux-release-clang -j

  test:
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-${{ github.sha }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-
      - name: Bootstrap vcpkg
        run: |
          if [ ! -x "$VCPKG_ROOT/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
            "$VCPKG_ROOT/bootstrap-vcpkg.sh"
          fi
      - name: Install Vulkan tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs libvulkan1 mesa-vulkan-drivers ninja-build vulkan-tools
          git lfs install --local
          git lfs pull
      - name: Vulkan smoke
        run: |
          LVP_ICD="$(find /usr/share/vulkan/icd.d -maxdepth 1 -type f \( -name 'lvp_icd*.json' -o -name '*lavapipe*.json' \) | sort | head -n 1)"
          if [ -n "$LVP_ICD" ]; then
            export VK_ICD_FILENAMES="$LVP_ICD"
            echo "VK_ICD_FILENAMES=$LVP_ICD" >> "$GITHUB_ENV"
          else
            echo "No Lavapipe ICD file found; available ICDs:"
            find /usr/share/vulkan/icd.d -maxdepth 1 -type f -print | sort
          fi
          vulkaninfo --summary | tee /tmp/vulkaninfo-summary.txt
          grep -Ei 'GPU[0-9]+.*llvmpipe|llvmpipe' /tmp/vulkaninfo-summary.txt
          echo "Lavapipe detected (VK_ICD_FILENAMES=${VK_ICD_FILENAMES:-loader-default})"
      - name: Test Debug
        run: |
          cmake --preset linux-debug
          cmake --build --preset linux-debug -j
          ctest --preset linux-debug
