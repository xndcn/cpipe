name: build-and-test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-${{ github.sha }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-format clang-tidy ninja-build
          python3 -m pip install --user pre-commit
      - name: Bootstrap vcpkg
        run: |
          if [ ! -x "$VCPKG_ROOT/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
            "$VCPKG_ROOT/bootstrap-vcpkg.sh"
          fi
      - name: pre-commit
        run: pre-commit run --all-files
      - name: clang-tidy placeholder
        run: |
          cmake --preset linux-debug
          cmake --build --preset linux-debug -j
          run-clang-tidy -p build/linux-debug

  build-debug:
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-${{ github.sha }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-
      - name: Bootstrap vcpkg
        run: |
          if [ ! -x "$VCPKG_ROOT/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
            "$VCPKG_ROOT/bootstrap-vcpkg.sh"
          fi
      - name: Build Debug
        run: |
          cmake --preset linux-debug
          cmake --build --preset linux-debug -j

  build-release:
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-${{ github.sha }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-
      - name: Bootstrap vcpkg
        run: |
          if [ ! -x "$VCPKG_ROOT/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
            "$VCPKG_ROOT/bootstrap-vcpkg.sh"
          fi
      - name: Build Release
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake --preset linux-release-clang
          cmake --build --preset linux-release-clang -j

  test:
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-${{ github.sha }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-
      - name: Bootstrap vcpkg
        run: |
          if [ ! -x "$VCPKG_ROOT/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
            "$VCPKG_ROOT/bootstrap-vcpkg.sh"
          fi
      - name: Test Debug
        run: |
          cmake --preset linux-debug
          cmake --build --preset linux-debug -j
          ctest --preset linux-debug
